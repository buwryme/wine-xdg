name: Build Kombucha Unstable
on: workflow_dispatch
permissions:
  contents: write
  pull-requests: read
env:
  KOMBUCHA_VERSION: unstable
  WINE_COMMIT: e0663e8a283cd0ac36ebd95bbbdf97d99968d12c
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Build Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y \
            autoconf \
            binutils \
            bison \
            build-essential \
            ccache \
            flex \
            gettext \
            git \
            libasound2-dev \
            libavcodec-dev \
            libavformat-dev \
            libcapi20-dev \
            libcups2-dev \
            libfontconfig-dev \
            libfreetype-dev \
            libgl-dev \
            libgnutls28-dev \
            libgphoto2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libkrb5-dev \
            libpcap-dev \
            libpcsclite-dev \
            libpulse-dev \
            libudev-dev \
            libunwind-dev \
            libusb-1.0-0-dev \
            libsane-dev \
            libsdl2-dev \
            libv4l-dev \
            libvulkan-dev \
            libwayland-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbregistry-dev \
            libxrandr-dev \
            libxrender-dev \
            mingw-w64 \
            ocl-icd-opencl-dev \
            samba-dev \
            wget

      - name: Install NTSync Header
        run: |
          sudo wget -O /usr/include/linux/ntsync.h \
            https://raw.githubusercontent.com/torvalds/linux/refs/tags/v6.14/include/uapi/linux/ntsync.h

      - name: Fetch Sources
        run: |
          git clone https://gitlab.winehq.org/wine/wine.git --depth 1 \
            --revision=${{ env.WINE_COMMIT }}

      - name: Apply Patches
        run: |
          echo "INSTALL=$GITHUB_WORKSPACE/kombucha" >> $GITHUB_ENV

          git -C wine apply "$GITHUB_WORKSPACE"/patches/${{ env.KOMBUCHA_VERSION }}/*.patch

      - name: Configure Wine
        working-directory: wine
        run: |
          export CC="ccache gcc"
          export x86_64_CC="ccache x86_64-w64-mingw32-gcc"
          export CFLAGS="-fno-lto -U_FORTIFY_SOURCE -O2 -pipe -g -fcf-protection -fstack-protector-strong -fstack-clash-protection"
          export x86_64_CFLAGS="${CFLAGS}"
          mkdir -p ${{ env.INSTALL }}
          ./configure \
            --disable-tests \
            --disable-win16 \
            --enable-archs=x86_64 \
            --prefix=${{ env.INSTALL }} \
            --with-mingw \
            --without-oss

      - name: Configure Ccache
        uses: hendrikmuhs/ccache-action@v1.2

      - name: Build Wine
        working-directory: wine
        run: make -j$(($(nproc) + 1))

      - name: Install Wine
        working-directory: wine
        run: make install-lib INSTALL_PROGRAM_FLAGS=-s

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ env.KOMBUCHA_VERSION }}+$(date --utc +%Y%m%d%H%M%S)"
          NAME="kombucha-${TAG}"

          cd "${{ env.INSTALL }}"/..
          mv "${{ env.INSTALL }}" "${NAME}"
          rm -rf "${NAME}"/share/{applications,man}
          XZ_OPT=-9 tar -Jcf "${NAME}.tar.xz" "${NAME}"

          gh release create --prerelease --generate-notes "${TAG}" "${NAME}.tar.xz"
